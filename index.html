<html>
  <head><title>check</title></head>
  <body>
    <script>
  function checkConnection() {
    if (navigator.onLine) {
      // If online → go to home page
      window.location.href = "onlineindex.html";
    } else {
      // If offline → go to offline page
      window.location.href = "offlineindex.html";
    }
  }

  // Run when page loads
  checkConnection();
  
  
  
</script>
  </body>
</html>
